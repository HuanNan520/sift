name: Android Build · APK + AAB Release-Signed

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 跑 ubuntu-latest · 用 Repo Secret 注入 keystore + 密码
# 需要 Repo Secrets:
#   ANDROID_KEYSTORE_BASE64    · sift-release.keystore base64
#   ANDROID_KEYSTORE_PASSWORD  · keystore 密码
#   ANDROID_KEY_PASSWORD       · key 密码
#   ANDROID_KEY_ALIAS          · sift

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 26
        run: sdkmanager "ndk;26.1.10909125" "build-tools;35.0.0" "platforms;android-36"

      - name: Setup Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          source $HOME/.cargo/env
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
          cargo install tauri-cli --version "^2.0"

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p ~/.android
          echo "$KEYSTORE_B64" | base64 --decode > ~/.android/sift-release.keystore

      - name: Write keystore.properties
        env:
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        working-directory: pwa-mvp/tauri/src-tauri
        run: |
          # 先 init Android 项目(若 gen/android 不在 git)
          source $HOME/.cargo/env
          cargo tauri android init || true
          cat > gen/android/app/keystore.properties << EOF
          storeFile=${{ env.HOME }}/.android/sift-release.keystore
          storePassword=$STORE_PASS
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASS
          EOF

      - name: Sync PWA dist
        working-directory: pwa-mvp/tauri
        run: bash sync-dist.sh

      - name: cargo tauri android build
        working-directory: pwa-mvp/tauri/src-tauri
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: /usr/local/lib/android/sdk/ndk/26.1.10909125
        run: |
          source $HOME/.cargo/env
          cargo tauri android build --apk --aab

      - name: Find artifacts
        id: artifacts
        run: |
          APK=$(find pwa-mvp/tauri/src-tauri/gen/android/app/build/outputs/apk -name "*release*.apk" -not -name "*unsigned*" | head -1)
          AAB=$(find pwa-mvp/tauri/src-tauri/gen/android/app/build/outputs/bundle -name "*.aab" | head -1)
          echo "apk=$APK" >> $GITHUB_OUTPUT
          echo "aab=$AAB" >> $GITHUB_OUTPUT
          ls -lh "$APK" "$AAB" || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sift-android
          path: |
            pwa-mvp/tauri/src-tauri/gen/android/app/build/outputs/apk/**/*release*.apk
            pwa-mvp/tauri/src-tauri/gen/android/app/build/outputs/bundle/**/*.aab

      - name: Upload to release(tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifacts.outputs.apk }}
            ${{ steps.artifacts.outputs.aab }}
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
