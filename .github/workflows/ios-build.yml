name: iOS + macOS Build · TestFlight Upload

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upload_testflight:
        description: 'Upload to TestFlight (need Apple secrets configured)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

# 用户没 Mac · 跑 GitHub Actions macos-latest runner build iOS + 顺便 macOS
# 需要 Repo Secrets:
#   APPLE_TEAM_ID              · Apple Developer Team ID (10 chars)
#   APPLE_BUNDLE_ID            · top.huannan.sift
#   APPLE_CERT_BASE64          · Distribution Certificate .p12 base64
#   APPLE_CERT_PASSWORD        · .p12 password
#   APPLE_PROFILE_BASE64       · provisioning profile .mobileprovision base64
#   ASC_KEY_ID                 · App Store Connect API key id
#   ASC_KEY_ISSUER_ID          · API issuer id
#   ASC_KEY_BASE64             · AuthKey_*.p8 base64

jobs:
  ios:
    name: Build iOS + TestFlight
    runs-on: macos-latest
    if: ${{ github.event.inputs.upload_testflight == 'true' || startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          source $HOME/.cargo/env
          rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim
          cargo install tauri-cli --version "^2.0"

      - name: Setup Node (sync-dist needs nothing but tauri-cli wants node)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Import Apple Distribution Certificate
        env:
          CERT_B64: ${{ secrets.APPLE_CERT_BASE64 }}
          CERT_PASS: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          echo "$CERT_B64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p sift-build sift.keychain
          security default-keychain -s sift.keychain
          security unlock-keychain -p sift-build sift.keychain
          security import /tmp/cert.p12 -k sift.keychain -P "$CERT_PASS" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k sift-build sift.keychain
          rm /tmp/cert.p12

      - name: Install Provisioning Profile
        env:
          PROFILE_B64: ${{ secrets.APPLE_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_B64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/sift.mobileprovision

      - name: Sync PWA dist
        working-directory: pwa-mvp/tauri
        run: bash sync-dist.sh

      - name: tauri ios init (once · idempotent)
        working-directory: pwa-mvp/tauri/src-tauri
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          source $HOME/.cargo/env
          cargo tauri ios init || true

      - name: tauri ios build (universal · device + simulator)
        working-directory: pwa-mvp/tauri/src-tauri
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          source $HOME/.cargo/env
          cargo tauri ios build --export-method app-store-connect

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_ISSUER_ID: ${{ secrets.ASC_KEY_ISSUER_ID }}
          ASC_KEY_B64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_B64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          IPA=$(find pwa-mvp/tauri/src-tauri/gen/apple/build -name "*.ipa" | head -1)
          echo "Found IPA: $IPA"
          xcrun altool --upload-app --type ios \
            --file "$IPA" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_KEY_ISSUER_ID" \
            --verbose

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sift-ios-ipa
          path: pwa-mvp/tauri/src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: warn

  macos:
    name: Build macOS .dmg (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          source $HOME/.cargo/env
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo install tauri-cli --version "^2.0"

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Sync PWA dist
        working-directory: pwa-mvp/tauri
        run: bash sync-dist.sh

      - name: cargo tauri build (universal binary)
        working-directory: pwa-mvp/tauri/src-tauri
        run: |
          source $HOME/.cargo/env
          cargo tauri build --target universal-apple-darwin

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: sift-macos-dmg
          path: pwa-mvp/tauri/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload to release(tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: pwa-mvp/tauri/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
